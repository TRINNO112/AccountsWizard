<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }

        :root {
            --cake-scale: 1;
        }

        @media (max-width: 500px) {
            :root {
                --cake-scale: 0.75;
            }
        }

        @media (max-width: 380px) {
            :root {
                --cake-scale: 0.6;
            }
        }

        /* Stars background */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            from {
                opacity: 0.1;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Confetti */
        .confetti-wrap {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .confetto {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            border-radius: 2px;
            animation: fall var(--fall-dur) var(--fall-delay) linear infinite;
            opacity: 0;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) translateX(0);
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg) translateX(var(--sway));
                opacity: 0;
            }
        }

        /* Main scene */
        .scene {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* Happy Birthday text */
        .title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.8rem, 8vw, 4.5rem);
            color: #fff;
            text-shadow:
                0 0 20px #ff6ec7,
                0 0 40px #ff6ec7,
                0 0 80px #c44dff;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 10px;
            animation: titlePop 1.5s cubic-bezier(.36, 1.6, .5, 1) both, glow 4s ease-in-out infinite alternate;
            animation-delay: 0.5s, 2s;
            max-width: 95vw;
        }

        @keyframes titlePop {
            from {
                transform: scale(0) rotate(-5deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px #ff6ec7, 0 0 40px #ff6ec7, 0 0 80px #c44dff;
            }

            to {
                text-shadow: 0 0 30px #ffe066, 0 0 60px #ff6ec7, 0 0 120px #c44dff;
            }
        }

        /* Cake wrapper */
        .cake {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(var(--cake-scale));
            transition: transform 0.5s ease;
            animation: cakeRise 1.5s cubic-bezier(.36, 1.2, .5, 1) 0.8s both;
            will-change: transform;
        }

        @keyframes cakeRise {
            from {
                transform: scale(var(--cake-scale)) translateY(80px);
                opacity: 0;
            }

            to {
                transform: scale(var(--cake-scale)) translateY(0);
                opacity: 1;
            }
        }

        /* Candles row */
        .candles-row {
            display: flex;
            gap: 18px;
            margin-bottom: -2px;
            position: relative;
            z-index: 4;
        }

        .candle {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: candlePop 0.8s cubic-bezier(.36, 1.6, .5, 1) both;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .candle:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .candle:nth-child(1) {
            animation-delay: 1.2s;
        }

        .candle:nth-child(2) {
            animation-delay: 1.4s;
        }

        .candle:nth-child(3) {
            animation-delay: 1.6s;
        }

        .candle:nth-child(4) {
            animation-delay: 1.8s;
        }

        .candle:nth-child(5) {
            animation-delay: 2.0s;
        }

        @keyframes candlePop {
            from {
                transform: scaleY(0);
                opacity: 0;
                transform-origin: bottom;
            }

            to {
                transform: scaleY(1);
                opacity: 1;
                transform-origin: bottom;
            }
        }

        /* Flame */
        .flame-wrap {
            position: relative;
            width: 14px;
            height: 28px;
            margin-bottom: 2px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .flame {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 26px;
            background: radial-gradient(ellipse at 50% 90%, #fff 0%, #ffe566 25%, #ff9900 55%, #ff4400 80%, transparent 100%);
            border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
            animation: flicker 0.2s ease-in-out infinite alternate;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: bottom center;
        }

        .blown-out .flame {
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) scale(0) translateY(-10px) rotate(20deg);
            pointer-events: none;
            transition: all 0.3s ease-out;
        }

        .blown-out .glow-ring {
            opacity: 0;
            transform: translateX(-50%) scale(0);
        }

        /* Smoke effect */
        .smoke {
            position: absolute;
            top: -10px;
            width: 6px;
            height: 6px;
            background: rgba(200, 200, 200, 0.4);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .blown-out .smoke {
            animation: smokeRise 1.5s ease-out forwards;
        }

        @keyframes smokeRise {
            0% {
                opacity: 0;
                transform: translateY(0) scale(1);
            }

            20% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
                transform: translateY(-50px) translateX(25px) scale(3.5);
            }
        }

        .flame::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 14px;
            background: radial-gradient(ellipse at 50% 90%, #fff 0%, #ffe566 60%, transparent 100%);
            border-radius: 50%;
            animation: flicker2 0.2s ease-in-out infinite alternate;
        }

        .glow-ring {
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(255, 200, 0, 0.5) 0%, transparent 70%);
            animation: glowPulse 0.4s ease-in-out infinite alternate;
            transition: opacity 0.5s ease;
        }

        @keyframes flicker {
            from {
                transform: translateX(-50%) scaleX(1) scaleY(1) rotate(-2deg);
            }

            to {
                transform: translateX(-50%) scaleX(0.88) scaleY(1.08) rotate(2deg);
            }
        }

        @keyframes flicker2 {
            from {
                transform: translateX(-50%) scaleX(1) scaleY(1);
            }

            to {
                transform: translateX(-50%) scaleX(0.85) scaleY(1.1);
            }
        }

        @keyframes glowPulse {
            from {
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) scale(1.3);
            }
        }

        .candle-body {
            width: 14px;
            height: 50px;
            border-radius: 4px 4px 3px 3px;
            position: relative;
            overflow: hidden;
        }

        .candle-body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 3px;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            width: 3px;
        }

        .candle:nth-child(1) .candle-body {
            background: linear-gradient(180deg, #ff6b9d, #c0395e);
        }

        .candle:nth-child(2) .candle-body {
            background: linear-gradient(180deg, #ffe066, #f0a500);
        }

        .candle:nth-child(3) .candle-body {
            background: linear-gradient(180deg, #6bffb8, #00a878);
        }

        .candle:nth-child(4) .candle-body {
            background: linear-gradient(180deg, #66b8ff, #0066cc);
        }

        .candle:nth-child(5) .candle-body {
            background: linear-gradient(180deg, #e066ff, #9900cc);
        }

        .wick {
            width: 2px;
            height: 6px;
            background: #333;
            border-radius: 1px;
        }

        /* TOP TIER */
        .tier-top {
            position: relative;
            width: 200px;
            z-index: 3;
            animation: tierSlide 1s cubic-bezier(.36, 1.2, .5, 1) 1.0s both;
        }

        @keyframes tierSlide {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .tier-top-body {
            width: 200px;
            height: 70px;
            background: linear-gradient(160deg, #ff9fd4 0%, #ff6ec7 40%, #e0399e 100%);
            border-radius: 8px 8px 0 0;
            position: relative;
            box-shadow: inset -8px 0 16px rgba(0, 0, 0, 0.15), 0 4px 0 #c0305a;
            overflow: hidden;
        }

        .tier-top-body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg,
                    transparent 0px,
                    transparent 16px,
                    rgba(255, 255, 255, 0.06) 16px,
                    rgba(255, 255, 255, 0.06) 18px);
        }

        /* Frosting drips */
        .drip-wrap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 4px;
        }

        .drip {
            width: 14px;
            border-radius: 0 0 8px 8px;
            background: rgba(255, 255, 255, 0.85);
            animation: dripDrop 1.2s cubic-bezier(.4, 1.6, .6, 1) both;
        }

        @keyframes dripDrop {
            from {
                height: 0;
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .drip:nth-child(1) {
            height: 22px;
            animation-delay: 1.0s;
        }

        .drip:nth-child(2) {
            height: 14px;
            animation-delay: 1.1s;
        }

        .drip:nth-child(3) {
            height: 28px;
            animation-delay: 1.05s;
        }

        .drip:nth-child(4) {
            height: 18px;
            animation-delay: 1.15s;
        }

        .drip:nth-child(5) {
            height: 10px;
            animation-delay: 1.2s;
        }

        .drip:nth-child(6) {
            height: 24px;
            animation-delay: 1.08s;
        }

        .drip:nth-child(7) {
            height: 16px;
            animation-delay: 1.12s;
        }

        .drip:nth-child(8) {
            height: 30px;
            animation-delay: 1.02s;
        }

        .drip:nth-child(9) {
            height: 12px;
            animation-delay: 1.18s;
        }

        .drip:nth-child(10) {
            height: 20px;
            animation-delay: 1.07s;
        }

        /* Sprinkles */
        .sprinkle {
            position: absolute;
            width: 6px;
            height: 3px;
            border-radius: 3px;
            opacity: 0;
            animation: sprinkleIn 0.4s ease both;
        }

        @keyframes sprinkleIn {
            from {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(var(--rot));
                opacity: 1;
            }
        }

        /* MIDDLE TIER */
        .tier-mid {
            position: relative;
            width: 280px;
            z-index: 2;
            animation: tierSlide2 1s cubic-bezier(.36, 1.2, .5, 1) 0.8s both;
        }

        @keyframes tierSlide2 {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .tier-mid-body {
            width: 280px;
            height: 80px;
            background: linear-gradient(160deg, #b48aff 0%, #9b59f5 40%, #6e1fc8 100%);
            position: relative;
            box-shadow: inset -10px 0 20px rgba(0, 0, 0, 0.2), 0 4px 0 #4a0f9e;
            overflow: hidden;
        }

        .tier-mid-body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg,
                    transparent 0px,
                    transparent 20px,
                    rgba(255, 255, 255, 0.05) 20px,
                    rgba(255, 255, 255, 0.05) 22px);
        }

        .mid-drip-wrap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 4px;
        }

        .mid-drip {
            width: 16px;
            border-radius: 0 0 8px 8px;
            background: rgba(255, 255, 255, 0.8);
            animation: dripDrop 1.2s cubic-bezier(.4, 1.6, .6, 1) both;
        }

        .mid-drip:nth-child(1) {
            height: 20px;
            animation-delay: 0.85s;
        }

        .mid-drip:nth-child(2) {
            height: 32px;
            animation-delay: 0.9s;
        }

        .mid-drip:nth-child(3) {
            height: 16px;
            animation-delay: 0.88s;
        }

        .mid-drip:nth-child(4) {
            height: 26px;
            animation-delay: 0.92s;
        }

        .mid-drip:nth-child(5) {
            height: 14px;
            animation-delay: 0.87s;
        }

        .mid-drip:nth-child(6) {
            height: 28px;
            animation-delay: 0.91s;
        }

        .mid-drip:nth-child(7) {
            height: 18px;
            animation-delay: 0.89s;
        }

        .mid-drip:nth-child(8) {
            height: 22px;
            animation-delay: 0.93s;
        }

        .mid-drip:nth-child(9) {
            height: 12px;
            animation-delay: 0.86s;
        }

        .mid-drip:nth-child(10) {
            height: 30px;
            animation-delay: 0.94s;
        }

        .mid-drip:nth-child(11) {
            height: 16px;
            animation-delay: 0.88s;
        }

        .mid-drip:nth-child(12) {
            height: 24px;
            animation-delay: 0.9s;
        }

        /* BOTTOM TIER */
        .tier-bot {
            position: relative;
            width: 360px;
            z-index: 1;
            animation: tierSlide3 1s cubic-bezier(.36, 1.2, .5, 1) 0.6s both;
        }

        @keyframes tierSlide3 {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .tier-bot-body {
            width: 360px;
            height: 95px;
            background: linear-gradient(160deg, #ffe57a 0%, #ffcc00 40%, #e0a000 100%);
            position: relative;
            box-shadow: inset -12px 0 24px rgba(0, 0, 0, 0.15), 0 6px 0 #b07800;
            overflow: hidden;
        }

        .tier-bot-body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg,
                    transparent 0px,
                    transparent 24px,
                    rgba(255, 255, 255, 0.06) 24px,
                    rgba(255, 255, 255, 0.06) 26px);
        }

        .bot-drip-wrap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 4px;
        }

        .bot-drip {
            width: 18px;
            border-radius: 0 0 9px 9px;
            background: rgba(255, 255, 255, 0.75);
            animation: dripDrop 1.2s cubic-bezier(.4, 1.6, .6, 1) both;
        }

        .bot-drip:nth-child(1) {
            height: 18px;
            animation-delay: 0.6s;
        }

        .bot-drip:nth-child(2) {
            height: 28px;
            animation-delay: 0.65s;
        }

        .bot-drip:nth-child(3) {
            height: 14px;
            animation-delay: 0.63s;
        }

        .bot-drip:nth-child(4) {
            height: 34px;
            animation-delay: 0.67s;
        }

        .bot-drip:nth-child(5) {
            height: 20px;
            animation-delay: 0.61s;
        }

        .bot-drip:nth-child(6) {
            height: 26px;
            animation-delay: 0.68s;
        }

        .bot-drip:nth-child(7) {
            height: 16px;
            animation-delay: 0.64s;
        }

        .bot-drip:nth-child(8) {
            height: 30px;
            animation-delay: 0.66s;
        }

        .bot-drip:nth-child(9) {
            height: 12px;
            animation-delay: 0.62s;
        }

        .bot-drip:nth-child(10) {
            height: 24px;
            animation-delay: 0.69s;
        }

        .bot-drip:nth-child(11) {
            height: 18px;
            animation-delay: 0.63s;
        }

        .bot-drip:nth-child(12) {
            height: 32px;
            animation-delay: 0.67s;
        }

        .bot-drip:nth-child(13) {
            height: 14px;
            animation-delay: 0.61s;
        }

        .bot-drip:nth-child(14) {
            height: 22px;
            animation-delay: 0.65s;
        }

        /* Plate */
        .plate {
            width: 400px;
            height: 22px;
            background: linear-gradient(180deg, #f0f0f0 0%, #d0d0d0 60%, #b0b0b0 100%);
            border-radius: 50%;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            animation: tierSlide3 1s cubic-bezier(.36, 1.2, .5, 1) 0.5s both;
            position: relative;
        }

        .plate::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 10%;
            right: 10%;
            height: 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
        }

        /* Decorative dots on tiers */
        .dots-row {
            position: absolute;
            bottom: 12px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-evenly;
            padding: 0 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            animation: dotIn 0.3s ease both;
        }

        @keyframes dotIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        /* Floating hearts / stars around cake */
        .floater {
            position: absolute;
            font-size: 1.4rem;
            animation: float var(--float-dur) ease-in-out infinite alternate, fadeInFloat 1s ease var(--float-delay) both;
            pointer-events: none;
        }

        @keyframes float {
            from {
                transform: translateY(0) rotate(-10deg) scale(1);
            }

            to {
                transform: translateY(-18px) rotate(10deg) scale(1.1);
            }
        }

        @keyframes fadeInFloat {
            from {
                opacity: 0;
                transform: scale(0);
            }

            to {
                opacity: 1;
            }
        }

        /* Subtitle */
        .subtitle {
            font-family: 'Nunito', sans-serif;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            margin-top: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: fadeUp 1s ease 1.5s both;
        }

        @keyframes fadeUp {
            from {
                transform: translateY(16px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Ambient light from candles */
        .ambient {
            position: absolute;
            top: -60px;
            width: 220px;
            height: 80px;
            background: radial-gradient(ellipse, rgba(255, 200, 50, 0.18) 0%, transparent 70%);
            border-radius: 50%;
            animation: ambientPulse 1s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes ambientPulse {
            from {
                opacity: 0.5;
                transform: scaleX(0.9);
            }

            to {
                opacity: 1;
                transform: scaleX(1.1);
            }
        }

        .btn-wrap {
            margin-top: 40px;
            animation: fadeUp 1s ease 3s both;
            z-index: 20;
        }

        .blow-btn {
            background: linear-gradient(135deg, #ff6ec7, #c44dff);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 110, 199, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .blow-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 110, 199, 0.6);
        }

        .blow-btn:active {
            transform: scale(0.95) translateY(0);
        }
    </style>
</head>

<body>

    <!-- Stars background -->
    <div class="stars" id="stars"></div>

    <!-- Confetti -->
    <div class="confetti-wrap" id="confetti"></div>

    <!-- Scene -->
    <div class="scene">
        <div class="title">Happy Birthday Swoyamshree!</div>

        <div class="cake">
            <div class="ambient"></div>

            <!-- Candles -->
            <div class="candles-row" id="candles-row">
                <!-- JS generated -->
            </div>

            <!-- Top tier -->
            <div class="tier-top">
                <div class="tier-top-body" id="top-body">
                    <div class="drip-wrap" id="top-drips"></div>
                    <div class="dots-row" id="top-dots"></div>
                </div>
            </div>

            <!-- Mid tier -->
            <div class="tier-mid">
                <div class="tier-mid-body" id="mid-body">
                    <div class="mid-drip-wrap" id="mid-drips"></div>
                    <div class="dots-row" id="mid-dots"></div>
                </div>
            </div>

            <!-- Bottom tier -->
            <div class="tier-bot">
                <div class="tier-bot-body" id="bot-body">
                    <div class="bot-drip-wrap" id="bot-drips"></div>
                    <div class="dots-row" id="bot-dots"></div>
                </div>
            </div>

            <!-- Plate -->
            <div class="plate"></div>

            <!-- Floating emojis -->
            <div class="floater" style="left:-80px; top:40px; --float-dur:2.3s; --float-delay:1.2s;">🎉</div>
            <div class="floater" style="right:-75px; top:20px; --float-dur:2.8s; --float-delay:1.4s;">⭐</div>
            <div class="floater" style="left:-65px; top:140px; --float-dur:3.1s; --float-delay:1.6s;">🎈</div>
            <div class="floater" style="right:-70px; top:130px; --float-dur:2.5s; --float-delay:1.8s;">🎊</div>
            <div class="floater" style="left:-90px; top:220px; --float-dur:2.7s; --float-delay:2.0s;">💖</div>
            <div class="floater" style="right:-85px; top:210px; --float-dur:3.0s; --float-delay:2.2s;">🌟</div>
        </div>

        <div class="subtitle">Make a wish ✨</div>

        <div class="btn-wrap">
            <button class="blow-btn" id="blow-all">Blow Out All Candles 🌬️</button>
        </div>
    </div>

    <script>
        // Stars
        const starsEl = document.getElementById('stars');
        const starCount = window.innerWidth < 500 ? 30 : 60;
        for (let i = 0; i < starCount; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 3 + 1;
            s.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${1.5 + Math.random() * 2.5}s;
      animation-delay: ${Math.random() * 3}s;
    `;
            starsEl.appendChild(s);
        }

        // Confetti
        const confettiEl = document.getElementById('confetti');
        const colors = ['#ff6ec7', '#ffe066', '#66ffb2', '#66b8ff', '#e066ff', '#ff6666', '#ffaa44'];
        const confettiCount = window.innerWidth < 500 ? 20 : 35;
        for (let i = 0; i < confettiCount; i++) {
            const c = document.createElement('div');
            c.className = 'confetto';
            const color = colors[Math.floor(Math.random() * colors.length)];
            const isCircle = Math.random() > 0.5;
            c.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${color};
      border-radius: ${isCircle ? '50%' : '2px'};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      --fall-dur: ${3 + Math.random() * 4}s;
      --fall-delay: ${Math.random() * 5}s;
      --sway: ${(Math.random() - 0.5) * 100}px;
    `;
            confettiEl.appendChild(c);
        }

        // Candles
        const candlesRow = document.getElementById('candles-row');
        for (let i = 0; i < 5; i++) {
            const div = document.createElement('div');
            div.className = 'candle';
            div.id = `candle-${i}`;
            div.innerHTML = `
      <div class="flame-wrap">
        <div class="smoke"></div>
        <div class="glow-ring"></div>
        <div class="flame"></div>
      </div>
      <div class="wick"></div>
      <div class="candle-body"></div>
    `;
            div.style.animationDelay = (1.2 + i * 0.2) + 's';
            div.addEventListener('click', () => {
                div.classList.toggle('blown-out');
            });
            candlesRow.appendChild(div);
        }

        // Blow all
        document.getElementById('blow-all').addEventListener('click', () => {
            const allCandles = document.querySelectorAll('.candle');
            const isAnyLit = Array.from(allCandles).some(c => !c.classList.contains('blown-out'));

            allCandles.forEach(c => {
                if (isAnyLit) {
                    c.classList.add('blown-out');
                } else {
                    c.classList.remove('blown-out');
                }
            });

            const btn = document.getElementById('blow-all');
            btn.textContent = isAnyLit ? 'Light All Candles 🔥' : 'Blow Out All Candles 🌬️';
        });

        // Drips helper
        function makeDrips(id, count, cls) {
            const el = document.getElementById(id);
            for (let i = 0; i < count; i++) {
                const d = document.createElement('div');
                d.className = cls;
                el.appendChild(d);
            }
        }

        makeDrips('top-drips', 10, 'drip');
        makeDrips('mid-drips', 12, 'mid-drip');
        makeDrips('bot-drips', 14, 'bot-drip');

        // Dots helper
        function makeDots(id, count, colors, delayBase) {
            const el = document.getElementById(id);
            colors.forEach((color, i) => {
                const d = document.createElement('div');
                d.className = 'dot';
                d.style.background = color;
                d.style.animationDelay = (delayBase + i * 0.07) + 's';
                el.appendChild(d);
            });
        }

        makeDots('top-dots', 8, ['#ffe066', '#ff6666', '#66ffb8', '#66b8ff', '#e066ff', '#ffaa44', '#fff', '#ff6ec7'], 1.2);
        makeDots('mid-dots', 10, ['#ffe066', '#ff6ec7', '#66ffb8', '#ffaa44', '#fff', '#ff6666', '#66b8ff', '#e066ff', '#ffe066', '#fff'], 1.0);
        makeDots('bot-dots', 13, ['#ff6ec7', '#ffe066', '#66b8ff', '#e066ff', '#66ffb8', '#ffaa44', '#fff', '#ff6666', '#ff6ec7', '#ffe066', '#66ffb8', '#66b8ff', '#fff'], 0.8);

        // Sprinkles
        const sprinkleColors = ['#ff6ec7', '#ffe066', '#66ffb8', '#66b8ff', '#e066ff', '#ffaa44', '#ff6666'];
        function addSprinkles(bodyId, count, delayBase) {
            const body = document.getElementById(bodyId);
            const w = body.offsetWidth || 200;
            const h = body.offsetHeight || 70;
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                s.className = 'sprinkle';
                s.style.cssText = `
        background: ${sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)]};
        left: ${10 + Math.random() * (w - 20)}px;
        top: ${10 + Math.random() * (h - 20)}px;
        --rot: ${Math.random() * 360}deg;
        animation-delay: ${delayBase + Math.random() * 0.4}s;
      `;
                body.appendChild(s);
            }
        }

        setTimeout(() => {
            addSprinkles('top-body', 14, 1.1);
            addSprinkles('mid-body', 20, 0.9);
            addSprinkles('bot-body', 26, 0.7);
        }, 100);
    </script>
</body>

</html>
